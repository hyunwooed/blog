# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: hyunwooed/blog
  auth_methods: [token]

site_url: https://hyunwoo.org
logo:
  src: /icon.svg
  show_in_header: true

media_folder: /public/uploads
public_folder: /uploads

collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: /content/posts
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string }
      - { label: Published Date, name: publishDate, widget: datetime, type: date }
      - { label: Updated Date, name: updatedDate, widget: datetime, type: date, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - name: coverImage
        label: Cover Image
        widget: object
        required: false
        fields:
          - { name: src, label: Source, widget: image }
          - { name: alt, label: Alt Text, widget: string }
      - { label: OG Image, name: ogImage, widget: image, required: false }
      - { label: Draft, name: draft, widget: boolean, required: false }
      - { label: Pinned, name: pinned, widget: boolean, required: false }
      - { label: Body, name: body, widget: richtext }
    sortable_fields:
      fields: [title, publishDate, updatedDate, tags]
      default:
        field: publishDate
        direction: descending
  - name: notes
    label: Notes
    label_singular: Note
    folder: /content/notes
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false }
      - { label: Published Date, name: publishDate, widget: datetime, output_utc: true }
      - { label: Body, name: body, widget: richtext }
    sortable_fields:
      fields: [title, publishDate]
      default:
        field: publishDate
        direction: descending
  - name: tags
    label: Tags
    label_singular: Tag
    folder: /content/tags
    fields:
      - { label: Title, name: title, widget: string, required: false }
      - { label: Description, name: description, widget: string, required: false }
      - { label: Body, name: body, widget: richtext }

media_libraries:
  cloudflare_r2:
    access_key_id: d57d4ec2eae7e6267ee94f6e352c878f
    bucket: blog
    account_id: dc14cfb137afeafec178849ea6ab3bed
    public_url: https://media.hyunwoo.org
    prefix: cms-uploads/ # Optional
    jurisdiction: default # Optional; 'default' | 'eu' | 'fedramp'

output:
  omit_empty_optional_fields: true